spring:
  devtools:
    restart:
      enabled: true         # Enable automatic restart (default is true)
      poll-interval: 1000ms # Poll interval for changes (default is 1s)
    livereload:
      enabled: true         # Enable live reload (default is true)
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/app_db}
    username: ${JDBC_DATABASE_USERNAME:app_user}
    password: ${JDBC_DATABASE_PASSWORD:password}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        id:
          new_generator_mappings: true
jwt:
  secret: ${JWT_SECRET:changeme-use-a-real-HS512-secret-in-application-local-yml}
  expiration: 3600000  # 1 hour in milliseconds
error:
  handling:
    http-status-in-json-response: true
    exception-logging: NO_LOGGING
    full-stacktrace-http-statuses: 5xx
    log-levels:
      5xx: ERROR
springdoc:
  pathsToMatch: /
logging:
  level:
    org.springframework: ERROR
server:
  error:
    include-stacktrace: never